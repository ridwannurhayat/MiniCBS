
# Ensure schema is rebuilt per test
quarkus.hibernate-orm.database.generation=drop-and-create

# Disable loading import.sql automatically for tests
quarkus.hibernate-orm.sql-load-script=no-file

# Enable logging for SQL and Quarkus test lifecycle
quarkus.log.category."org.hibernate.SQL".level=DEBUG
quarkus.log.category."io.quarkus.test.common".level=DEBUG
quarkus.index-dependency.acme.group-id=id.ridwan.minicbs
